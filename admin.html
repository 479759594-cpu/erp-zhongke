<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中科数控 · 售后管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar"><div class="logo-area"><div class="name">中科数控</div><div class="sub">售后管理后台</div></div><nav class="s-nav" id="sideNav"></nav></aside>
<div class="main"><div class="topbar" id="topBar" style="position:relative"></div><div class="page" id="page"></div></div>
<div class="print-area" id="printArea"></div>
<div class="toasts" id="toasts"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="dp-overlay" id="dpOverlay"><div class="dp-picker"><div class="dp-header"><button class="dp-cancel" onclick="closeDatePicker()">取消</button><span class="dp-title">选择日期</span><button class="dp-confirm" onclick="confirmDatePicker()">确定</button></div><div style="position:relative"><div class="dp-columns" id="dpColumns"></div><div class="dp-mask"></div><div class="dp-highlight"></div></div></div></div>
<script src="admin.js"></script>
</body>
</html>
